<link rel="stylesheet" href="/assets/styles.css">

<body>
    <input id="new-character-modal-toggle" class="modal-toggle" type="checkbox" />
    <div class="convo-page">
        <div class="layout">
             <div class="left">
                <header id="chats-header">Chats</header>
                <div id="chat-cards">
                    <div class="active-chat-pane">
                        <button class="chat-card new-chat-card" type="button" aria-label="New chat">
                            <span class="new-chat-card-content">
                                <span class="new-chat-plus" aria-hidden="true">+</span>
                                <span class="new-chat-label">New Chat</span>
                            </span>
                        </button>
                        <span class="chat-card">
                            <img src="/character-images/Nino.png" class="chat-card-image">
                            <div class="chat-card-text">
                                <header>bruh</header>
                            </div>
                        </span>
                    </div>
                </div>
            </div>
            <div class="middle">
                <div class="convo-pane">
                    <div class="convo-head">
                        <header id="convo-title">Chat title</header>
                        <div class="convo-head-imgs">
                            {{CONVO_HEAD_CHARACTERS}}
                        </div>
                        <div class="pipeline-bubble">
                            {{PIPELINE_BUBBLE}}
                        </div>
                    </div>
                    <div class="chat-window">
                        <div class="chat-bubbles">
                            {{CONVO_MESSAGES}}
                        </div>
                    </div>
                </div>
            </div>
            <div class="right">inshallah there will be a right sidebar here</div>
        </div>
    </div>
</body>
