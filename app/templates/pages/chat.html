<link rel="stylesheet" href="/assets/css/styles.css">

<body>
    <script src="/assets/js/chats/sendChat.js" defer></script>
    <script src="/assets/js/ui/addCharacterToChat.js" defer></script>
    <script src="/assets/js/chats/editMessage.js" defer></script>
    <div class="convo-page">
        <div class="layout">
             <div class="left">
                <header id="chats-header">Chats</header>
                <div id="chat-cards">
                    <div class="active-chat-pane">
                        <button class="chat-card new-chat-card" type="button" aria-label="New chat">
                            <span class="new-chat-card-content">
                                <span class="new-chat-plus" aria-hidden="true">+</span>
                                <span class="new-chat-label">New Chat</span>
                            </span>
                        </button>
                        <span class="chat-card">
                            <img src="/character-images/Nino.png" class="chat-card-image">
                            <div class="chat-card-text">
                                <header>bruh</header>
                            </div>
                        </span>
                    </div>
                </div>
            </div>
            <div class="middle">
                <div class="convo-pane">
                    <div class="convo-head">
                        <header id="convo-title">Chat title</header>
                        <div class="convo-head-imgs">
                            <button class="convo-head-add" type="button" aria-label="Add character" onclick="addCharacterToChat()">
                                <svg class="convo-head-add-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5v14M5 12h14" />
                                </svg>
                            </button>
                            <button class="convo-head-x hidden" type="button" aria-label="Remove character" onclick="continueConvoWithCharacters()">
                                <svg class="convo-head-x-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M6 6l12 12M18 6L6 18" />
                                </svg>
                            </button>
                            {{CONVO_HEAD_CHARACTERS}}
                        </div>
                        <div class="pipeline-bubble">
                            {{PIPELINE_BUBBLE}}
                        </div>
                    </div>
                    <div class="chat-window">
                        <div class="chat-bubbles">
                            {{CONVO_MESSAGES}}
                        </div>
                    </div>
                    <form class="chat-input-bar" id="chat-message-form">
                        <textarea
                            class="chat-input"
                            id="chatMessageInput"
                            name="chatMessageInput"
                            placeholder="Type a message..."
                        ></textarea>

                        <button class="chat-send-button" type="submit" aria-label="Send message">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 12 H18 M13 7 L18 12 L13 17" />
                            </svg>
                        </button>
                    </form>
                </div>
                <div id="character-cards" class="chat-character-picker">
                    {{CHARACTER_CARDS}}
                </div>
            </div>
            <div class="right">inshallah there will be a right sidebar here</div>
        </div>
    </div>
</body>
